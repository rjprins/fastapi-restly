<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      .sans { font-family: "Noto Sans", "DejaVu Sans", sans-serif; }
      .mono { font-family: "JetBrains Mono", "DejaVu Sans Mono", monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#ffffff"/>

  <!-- soft brand circle behind mascot -->
  <circle cx="1015" cy="350" r="285" fill="#e7f3f4"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1280" height="10" fill="#0a7d91"/>

  <!-- mascot: the resting "Restly" cat -->
  <image xlink:href="restly-cat.png"
         x="745" y="235" width="512" height="333"/>

  <!-- wordmark -->
  <text class="sans" x="90" y="240" font-size="78" font-weight="700" fill="#12303a">FastAPI-<tspan fill="#0a7d91">Restly</tspan></text>

  <!-- tagline -->
  <text class="sans" x="92" y="305" font-size="40" font-weight="500" fill="#14424c">A REST framework for FastAPI</text>

  <!-- feature lines -->
  <text class="sans" x="92" y="352" font-size="24" font-weight="400" fill="#5a7175">Class-based views &#183; Auto-generated CRUD</text>
  <text class="sans" x="92" y="386" font-size="24" font-weight="400" fill="#5a7175">SQLAlchemy 2.0 &#183; Pydantic v2 &#183; React-Admin ready</text>

  <!-- pip install pill -->
  <rect x="92" y="428" width="486" height="62" rx="14" fill="#f0f8f8" stroke="#bfe0e2" stroke-width="2"/>
  <text class="mono" x="118" y="468" font-size="25" fill="#0a7d91"><tspan fill="#93b4b6">$ </tspan>pip install fastapi-restly</text>

  <!-- domain -->
  <text class="sans" x="94" y="556" font-size="27" font-weight="700" fill="#0a7d91">fastapi-restly.org</text>
</svg>
