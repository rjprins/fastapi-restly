name: Latest versions

# Weekly canary for the top edge of the dependency range: re-resolve every
# lockfile to the newest available versions and run the full suite. A failure
# here means upstream moved, not that main is broken -- fix forward.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  latest-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Upgrade all lockfiles to the latest resolutions
        run: |
          uv lock --upgrade
          for d in example-projects/*/; do (cd "$d" && uv lock --upgrade); done

      - name: Install dependencies
        run: make install-dev

      - name: Run framework and example tests
        run: make test-all
