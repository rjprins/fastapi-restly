name: Publish Pages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "docs/**"
      - "fastapi_restly/**"
      - "scripts/render_switcher.py"
      - "Makefile"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      snapshot_version:
        description: "Freeze a snapshot for this minor (e.g. 0.7) from the current ref"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The in-development build off main -> /dev/ (noindex). It is never published
  # to the site root anymore; the root tracks the latest release (see below).
  # keep_files preserves the root and the frozen /<minor>/ snapshots alongside it.
  dev:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.snapshot_version == '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags drive switcher.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Build docs and coverage site
        env:
          DOCS_VERSION: dev
        run: make build-pages

      - name: Publish dev to gh-pages /dev/
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/html
          destination_dir: dev
          keep_files: true

  # A release freezes the /<minor>/ snapshot AND republishes that same tag to the
  # root ("latest"), so the default docs always track the newest release. Both
  # builds run off the released tag, sequentially in one job, so the two gh-pages
  # writes never race. A manual dispatch with snapshot_version only backfills a
  # /<minor>/ snapshot from the current ref and never touches the root.
  release:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.snapshot_version != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags drive switcher.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Resolve the target minor (e.g. 0.7)
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            ver="${tag#v}"
            minor="${ver%.*}"
          else
            minor="${{ github.event.inputs.snapshot_version }}"
          fi
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Build the /<minor>/ snapshot
        env:
          DOCS_VERSION: ${{ steps.ver.outputs.minor }}
        run: |
          uv run sphinx-build -M html docs site -W --keep-going
          uv run python scripts/render_switcher.py site/html/switcher.json

      - name: Publish snapshot to /${{ steps.ver.outputs.minor }}/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/html
          destination_dir: ${{ steps.ver.outputs.minor }}
          keep_files: true

      # Only a real release refreshes the root. Rebuild the same tag as "latest"
      # (root base URL, indexed) with coverage; the refreshed switcher.json rides
      # along in the published tree.
      - name: Build the root ("latest") from the released tag
        if: github.event_name == 'release'
        env:
          DOCS_VERSION: latest
        run: make build-pages

      - name: Publish latest to gh-pages root
        if: github.event_name == 'release'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/html
          keep_files: true
          cname: www.fastapi-restly.org

      # A dispatch backfill does not rebuild the root, so push the refreshed
      # switcher.json to the root directly -- a newly frozen minor then surfaces
      # in every build's dropdown without waiting for the next release.
      - name: Stage the refreshed switcher
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p switcher-root
          cp site/html/switcher.json switcher-root/switcher.json

      - name: Publish switcher.json to gh-pages root
        if: github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: switcher-root
          destination_dir: .
          keep_files: true
