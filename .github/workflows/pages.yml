name: Publish Pages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "docs/**"
      - "fastapi_restly/**"
      - "Makefile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build docs and coverage site
        run: make build-pages

      - name: Publish to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: uv run ghp-import --no-history --no-jekyll --push site/html
