name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: make install-dev

      - name: Run pre-commit hooks
        run: make pre-commit-run

  typing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: make install-dev

      - name: Run pyright on typing fixtures
        run: make test-typing

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: make install-dev

      - name: Run framework and example tests
        run: make test-all

  min-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      # The -W overrides relax pytest's warnings-as-errors for this leg only:
      # floor versions of the TestClient stack (anyio/httpx) leak AF_UNIX
      # socketpairs that surface as GC-timing-dependent ResourceWarnings.
      # Not a Restly leak -- the latest-deps suite stays strict.
      - name: Run framework tests with minimum direct dependency versions
        run: >-
          uv run
          --isolated
          --no-dev
          --resolution lowest-direct
          --extra testing
          --with "aiosqlite>=0.21.0"
          pytest tests/ -q
          -W "default::ResourceWarning"
          -W "default::pytest.PytestUnraisableExceptionWarning"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: make install-dev

      - name: Run framework coverage
        run: make test-coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Install dependencies
        run: make install-dev

      - name: Build documentation
        run: make docs

  build:
    runs-on: ubuntu-latest
    needs: [lint, typing, test, min-versions, coverage, docs]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            example-projects/*/uv.lock

      - name: Build package
        run: uv build

      - name: Smoke-test wheel
        run: >-
          uv run
          --isolated
          --no-project
          --with "$(ls dist/*.whl)"
          python -c "from importlib.metadata import version; import fastapi_restly; import fastapi_restly.db; import fastapi_restly.schemas; import fastapi_restly.views; print(version('fastapi-restly'))"

      - name: Check package
        run: uv run --with twine twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
